version: '3.8'

services:
  kbia-backend:
    build: ./backend
    container_name: kbia-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://spcadmin:PASSWORD@spcapps-postgres:5432/kbia
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=production
      - DEBUG=False
      - FRONTEND_URL=http://kbia-frontend:3000
    networks:
      - spcapps-network

  kbia-frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://kbia-backend:8000
    container_name: kbia-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://kbia-backend:8000
      - HOSTNAME=0.0.0.0
    networks:
      - spcapps-network

networks:
  spcapps-network:
    external: true
