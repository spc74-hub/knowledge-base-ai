<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background with gradient -->
  <rect width="512" height="512" fill="url(#grad)"/>

  <!-- Book/Knowledge icon -->
  <g transform="translate(256, 220)">
    <!-- Left page -->
    <path d="M-100 -80 L-100 80 Q-100 95 -85 95 L-10 95 L-10 -95 L-85 -95 Q-100 -95 -100 -80 Z"
          fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M100 -80 L100 80 Q100 95 85 95 L10 95 L10 -95 L85 -95 Q100 -95 100 -80 Z"
          fill="white" opacity="0.95"/>
    <!-- Center binding -->
    <rect x="-10" y="-95" width="20" height="190" fill="white"/>

    <!-- AI dots on pages -->
    <circle cx="-55" cy="-30" r="10" fill="#3B82F6"/>
    <circle cx="-55" cy="20" r="10" fill="#3B82F6"/>
    <circle cx="55" cy="-30" r="10" fill="#3B82F6"/>
    <circle cx="55" cy="20" r="10" fill="#3B82F6"/>

    <!-- Connection lines -->
    <line x1="-55" y1="-30" x2="0" y2="-50" stroke="#3B82F6" stroke-width="3"/>
    <line x1="55" y1="-30" x2="0" y2="-50" stroke="#3B82F6" stroke-width="3"/>
    <line x1="-55" y1="20" x2="0" y2="40" stroke="#3B82F6" stroke-width="3"/>
    <line x1="55" y1="20" x2="0" y2="40" stroke="#3B82F6" stroke-width="3"/>

    <!-- Central brain node -->
    <circle cx="0" cy="-5" r="18" fill="#1D4ED8"/>
    <circle cx="0" cy="-5" r="10" fill="white"/>
  </g>

  <!-- KBAI text -->
  <text x="256" y="420" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle">KBAI</text>
</svg>
